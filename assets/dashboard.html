<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Panel</title>
  <link rel="stylesheet" href="main.css">
  <style>
    .dash-box { max-width: 650px; margin: 30px auto; background: var(--color-bg-soft); padding: 25px; border-radius: 12px; border: 1px solid var(--color-line); }
    .item-card { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--color-accent); display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>
<div class="dash-box">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2>Book Workspace Profile 🖥️</h2>
    <a href="../index.html" class="pill-btn">Back to Home Layout</a>
  </div>
  
  <p style="margin-top:10px;">Access your active platform features seamlessly below:</p>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
    <a href="confessions.html" class="pill-btn">Open Confessions Wall</a>
    <a href="community.html" class="pill-btn">Open Community Spaces</a>
  </div>

  <hr style="border:none; border-top:1px solid var(--color-line);">
  
  <h3>✍️ Personal Creative Drafts Manager</h3>
  <textarea id="draftText" placeholder="Write a draft story log, review summary or journal here..."></textarea>
  <button class="pill-btn" style="width:100%;" onclick="saveLocalDraft()">Save Local Draft</button>

  <div id="draftLogs" style="margin-top:15px;"></div>
</div>

<script>
  // Paste your unique Google Apps Script deployment URL here
  const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbw4YPYY1GzMczYf-50pPeY_RsOcgWpJpWCLSJkVOnvUMr65oPC0efPz_4BQpycqRkXQIw/exec";

  // Fetches live personal drafts from Google Sheets
  async function renderDrafts() {
    const container = document.getElementById("draftLogs");
    container.innerHTML = "<p style='color: var(--color-gray);'>Loading your drafts...</p>";
    
    try {
      const response = await fetch(SHEETS_API_URL);
      const allRows = await response.json();
      
      // Filter for draft logs only
      const drafts = allRows.filter(item => item.type === "draft");
      
      container.innerHTML = drafts.length === 0 ? "<p>No drafts saved yet.</p>" : "";
      
      drafts.forEach((item) => {
        const div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML = `
          <span>${item.content}</span>
          <button class="pill-btn" style="background:#ff6b6b!important;" onclick="deleteDraft(${item.id})">Delete</button>
        `;
        container.appendChild(div);
      });
    } catch (error) {
      container.innerHTML = "<p style='color: #ff6b6b;'>Failed to load drafts.</p>";
      console.error("Sync Error:", error);
    }
  }

  // Saves a new personal draft to Google Sheets labeled as "draft"
  async function saveLocalDraft() {
    const inputEl = document.getElementById("draftText");
    const val = inputEl.value.trim();
    if (!val) return;

    inputEl.disabled = true;
    
    try {
      await fetch(SHEETS_API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "add",
          content: val,
          type: "draft"
        })
      });
      
      inputEl.value = "";
      setTimeout(renderDrafts, 600);
    } catch (error) {
      alert("Error saving draft.");
    } finally {
      inputEl.disabled = false;
    }
  }

  window.deleteDraft = (id) => {
    alert("Draft indexed as ID " + id + " flagged for deletion.");
    renderDrafts();
  };

  document.addEventListener("DOMContentLoaded", renderDrafts);
</script>
</body>
</html>
