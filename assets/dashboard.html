<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Panel</title>
  <link rel="stylesheet" href="main.css">
  <style>
    .dash-box { max-width: 650px; margin: 30px auto; background: var(--color-bg-soft); padding: 25px; border-radius: 12px; border: 1px solid var(--color-line); }
    .item-card { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--color-accent); display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>
<div class="dash-box">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2>Book Workspace Profile 🖥️</h2>
    <a href="../index.html" class="pill-btn">Back to Home Layout</a>
  </div>
  
  <p style="margin-top:10px;">Access your active platform features seamlessly below:</p>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
    <a href="confessions.html" class="pill-btn">Open Confessions Wall</a>
    <a href="community.html" class="pill-btn">Open Community Spaces</a>
  </div>

  <hr style="border:none; border-top:1px solid var(--color-line);">
  
  <h3>✍️ Personal Creative Drafts Manager</h3>
  <textarea id="draftText" placeholder="Write a draft story log, review summary or journal here..."></textarea>
  <button class="pill-btn" style="width:100%;" onclick="saveLocalDraft()">Save Local Draft</button>

  <div id="draftLogs" style="margin-top:15px;"></div>
</div>

<script>
  function renderDrafts() {
    const list = JSON.parse(localStorage.getItem("user_drafts") || "[]");
    const container = document.getElementById("draftLogs");
    container.innerHTML = list.length === 0 ? "<p>No drafts saved yet.</p>" : "";
    list.forEach((item, index) => {
      const div = document.createElement("div");
      div.className = "item-card";
      div.innerHTML = `<span>${item}</span><button class="pill-btn" style="background:#ff6b6b!important;" onclick="deleteDraft(${index})">Delete</button>`;
      container.appendChild(div);
    });
  }
  function saveLocalDraft() {
    const txt = document.getElementById("draftText").value.trim();
    if(!txt) return;
    const list = JSON.parse(localStorage.getItem("user_drafts") || "[]");
    list.push(txt);
    localStorage.setItem("user_drafts", JSON.stringify(list));
    document.getElementById("draftText").value = "";
    renderDrafts();
  }
  window.deleteDraft = (index) => {
    const list = JSON.parse(localStorage.getItem("user_drafts") || "[]");
    list.splice(index, 1);
    localStorage.setItem("user_drafts", JSON.stringify(list));
    renderDrafts();
  };
  document.addEventListener("DOMContentLoaded", renderDrafts);
</script>
</body>
</html>
