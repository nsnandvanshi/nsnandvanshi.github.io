<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confessions Wall</title>
  <link rel="stylesheet" href="main.css">
  <style>
    .panel { max-width:600px; margin:25px auto; background:var(--color-bg-soft); padding:20px; border-radius:12px; border:1px solid var(--color-line); }
    .post-card { background:rgba(255,255,255,0.03); padding:12px; border-radius:8px; margin-top:10px; display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>
<div class="panel">
  <div style="display:flex; justify-content:between; align-items:center; width:100%;">
    <a href="dashboard.html" style="color:var(--color-accent); font-weight:600;">&larr; Back to Dashboard</a>
  </div>
  <h2>Anonymous Confessions Wall 🤫</h2>
  <textarea id="confessInput" placeholder="Enter an anonymous note..."></textarea>
  <button class="pill-btn" style="width:100%; margin-top:5px;" onclick="addConfession()">Post to Wall</button>

  <div id="confessContainer" style="margin-top:20px;"></div>
</div>

<script>
  // Paste your unique Google Apps Script deployment URL here
  const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbw4YPYY1GzMczYf-50pPeY_RsOcgWpJpWCLSJkVOnvUMr65oPC0efPz_4BQpycqRkXQIw/exec";

  // Fetches live data from Google Sheets instead of localStorage
  async function renderConfessions() {
    const container = document.getElementById("confessContainer");
    container.innerHTML = "<p style='color: var(--color-gray);'>Loading live wall feed...</p>";
    
    try {
      const response = await fetch(SHEETS_API_URL);
      const allPosts = await response.json();
      
      // Filter out rows that belong specifically to this page type
      const confessions = allPosts.filter(item => item.type === "confession");
      
      container.innerHTML = confessions.length === 0 ? "<p>No entries on the wall yet.</p>" : "";
      
      confessions.forEach((item) => {
        const card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
          <span>${item.content}</span>
          <button class="pill-btn" style="background:#ff6b6b!important;" onclick="removeConfession(${item.id})">Delete</button>
        `;
        container.appendChild(card);
      });
    } catch (error) {
      container.innerHTML = "<p style='color: #ff6b6b;'>Failed to sync with live data.</p>";
      console.error("Sync Error:", error);
    }
  }

  // Sends new posts straight into a new row in Google Sheets
  async function addConfession() {
    const inputEl = document.getElementById("confessInput");
    const val = inputEl.value.trim();
    if (!val) return;

    inputEl.disabled = true; // Temporary lock while sending
    
    try {
      await fetch(SHEETS_API_URL, {
        method: "POST",
        mode: "no-cors", // Prevents local CORS blocks on basic static deployments
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "add",
          content: val,
          type: "confession"
        })
      });
      
      inputEl.value = "";
      // Give Google Sheets half a second to complete recording before refreshing
      setTimeout(renderConfessions, 600);
    } catch (error) {
      alert("Error posting submission.");
    } finally {
      inputEl.disabled = false;
    }
  }

  // Initial trigger to paint data on screen open
  document.addEventListener("DOMContentLoaded", renderConfessions);
</script>
</body>
</html>
