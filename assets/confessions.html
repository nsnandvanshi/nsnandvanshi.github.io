<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confessions Wall</title>
  <link rel="stylesheet" href="main.css">
  <style>
    .panel { max-width:600px; margin:25px auto; background:var(--color-bg-soft); padding:20px; border-radius:12px; border:1px solid var(--color-line); }
    .post-card { background:rgba(255,255,255,0.03); padding:12px; border-radius:8px; margin-top:10px; display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>
<div class="panel">
  <div style="display:flex; justify-content:between; align-items:center; width:100%;">
    <a href="dashboard.html" style="color:var(--color-accent); font-weight:600;">&larr; Back to Dashboard</a>
  </div>
  <h2>Anonymous Confessions Wall 🤫</h2>
  <textarea id="confessInput" placeholder="Enter an anonymous note..."></textarea>
  <button class="pill-btn" style="width:100%; margin-top:5px;" onclick="addConfession()">Post to Wall</button>

  <div id="confessContainer" style="margin-top:20px;"></div>
</div>

<script>
  function renderConfessions() {
    const data = JSON.parse(localStorage.getItem("wall_posts") || "[]");
    const container = document.getElementById("confessContainer");
    container.innerHTML = "";
    data.forEach((item, idx) => {
      const card = document.createElement("div");
      card.className = "post-card";
      card.innerHTML = `<span>${item}</span><button class="pill-btn" style="background:#ff6b6b!important;" onclick="removeConfession(${idx})">Delete</button>`;
      container.appendChild(card);
    });
  }
  window.addConfession = () => {
    const val = document.getElementById("confessInput").value.trim();
    if(!val) return;
    const data = JSON.parse(localStorage.getItem("wall_posts") || "[]");
    data.push(val);
    localStorage.setItem("wall_posts", JSON.stringify(data));
    document.getElementById("confessInput").value = "";
    renderConfessions();
  };
  window.removeConfession = (idx) => {
    const data = JSON.parse(localStorage.getItem("wall_posts") || "[]");
    data.splice(idx, 1);
    localStorage.setItem("wall_posts", JSON.stringify(data));
    renderConfessions();
  };
  document.addEventListener("DOMContentLoaded", renderConfessions);
</script>
</body>
</html>
