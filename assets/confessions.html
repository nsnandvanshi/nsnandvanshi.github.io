---
layout: default
title: Confession Wall
---

<section class="page-header">
  <div class="wrap">
    <span class="section-label">Anonymity Guaranteed</span>
    <h1>Confession Wall</h1>
    <p>Share your unspoken thoughts, secrets, or notes about love, healing, and life. Completely anonymous.</p>
  </div>
</section>

<section class="dashboard-core" style="padding: 40px 0;">
  <div class="wrap" style="display: grid; grid-template-columns: 1fr; gap: 40px;">
    
    <!-- Submission Form Panel -->
    <div class="interactive-card" style="padding: 30px; background: rgba(38, 26, 65, 0.4);">
      <h3 style="margin-top: 0; margin-bottom: 15px; font-family: var(--font-display);">Drop a Confession</h3>
      <form id="confessionForm">
        <div style="margin-bottom: 15px;">
          <textarea id="confessionContent" maxlength="500" placeholder="Type your confession here... What's on your heart?" required style="width: 100%; min-height: 120px; background: #140e24; border: 1px solid var(--color-line); border-radius: 6px; padding: 12px; color: #fff; font-family: inherit; resize: vertical;"></textarea>
          <small id="charCount" style="color: var(--color-muted); display: block; text-align: right; margin-top: 4px;">0 / 500</small>
        </div>
        <button type="submit" class="pill-btn" style="width: 100%; border: none; cursor: pointer;">Submit Anonymously</button>
      </form>
      <div id="formStatus" style="margin-top: 15px; font-size: 0.9rem; text-align: center; display: none;"></div>
    </div>

    <!-- Live Confessions Feed -->
    <div>
      <h2 style="font-family: var(--font-display); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
        <span>Recent Confessions</span>
        <span id="loadIndicator" class="section-label" style="text-transform: none;">Loading...</span>
      </h2>
      <div id="confessionsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        <!-- Dynamic cards will render here -->
      </div>
    </div>

  </div>
</section>

<script>
  // PASTE YOUR GOOGLE WEB APP URL HERE
  const SCRIPT_URL = "YOUR_DEPLOYED_WEB_APP_URL";
  const SHEET_NAME = "Confessions";

  const confessionContent = document.getElementById('confessionContent');
  const charCount = document.getElementById('charCount');
  const confessionForm = document.getElementById('confessionForm');
  const formStatus = document.getElementById('formStatus');
  const confessionsGrid = document.getElementById('confessionsGrid');
  const loadIndicator = document.getElementById('loadIndicator');

  // Character counter tracker
  confessionContent.addEventListener('input', () => {
    charCount.textContent = `${confessionContent.value.length} / 500`;
  });

  // Fetch and display active confessions
  async function loadConfessions() {
    try {
      loadIndicator.style.display = "inline-block";
      loadIndicator.textContent = "Updating...";
      const response = await fetch(`${SCRIPT_URL}?sheet=${SHEET_NAME}`);
      const result = await response.json();
      
      confessionsGrid.innerHTML = "";
      if (result.status === "success" && result.data.length > 0) {
        result.data.forEach(item => {
          const date = new Date(item.timestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
          const card = document.createElement('div');
          card.className = 'interactive-card';
          card.style.padding = '20px';
          card.style.background = 'rgba(255, 255, 255, 0.02)';
          card.innerHTML = `
            <p style="margin: 0 0 15px 0; font-style: italic; line-height: 1.6; color: #e2e8f0;">"${item.content}"</p>
            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--color-muted);">
              <span>🤫 Anonymous</span>
              <span>${date}</span>
            </div>
          `;
          confessionsGrid.appendChild(card);
        });
        loadIndicator.style.display = "none";
      } else {
        confessionsGrid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">The wall is empty. Be the first to break the silence.</div>';
        loadIndicator.style.display = "none";
      }
    } catch (error) {
      console.error(error);
      loadIndicator.textContent = "Error loading feed";
      confessionsGrid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1; color: #ff6b6b;">Failed to connect to backend engine. Ensure URL variables are correct.</div>';
    }
  }

  // Handle new submission pipeline
  confessionForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    formStatus.style.display = "block";
    formStatus.style.color = "var(--color-muted)";
    formStatus.textContent = "Sending message to server securely...";

    try {
      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", // Bypasses explicit browser origin blocks safely
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sheet: SHEET_NAME,
          username: "Anonymous",
          content: confessionContent.value
        })
      });

      formStatus.style.color = "#4ade80";
      formStatus.textContent = "Confession posted successfully!";
      confessionForm.reset();
      charCount.textContent = "0 / 500";
      
      // Delay feed reload slightly to allow Google infrastructure to sync rows
      setTimeout(loadConfessions, 1200);
    } catch (error) {
      formStatus.style.color = "#f87171";
      formStatus.textContent = "Submission error. Check network state.";
    }
  });

  // Init sequence on mount
  loadConfessions();
</script>
