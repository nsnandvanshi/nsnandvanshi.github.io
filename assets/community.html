<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Hub</title>
  <link rel="stylesheet" href="main.css">
  <style>
    .panel { max-width:600px; margin:25px auto; background:var(--color-bg-soft); padding:20px; border-radius:12px; border:1px solid var(--color-line); }
    .rules-banner { background:rgba(163,128,255,0.1); border-left:4px solid var(--color-accent); padding:10px; border-radius:6px; font-size:0.85rem; margin-bottom:15px; }
    .msg-card { background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; margin-top:8px; display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>
<div class="panel">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <a href="dashboard.html" style="color:var(--color-accent); font-weight:600;">&larr; Back to Dashboard</a>
  </div>
  <h2>Reader Community Room 🤝</h2>
  
  <div class="rules-banner">
    <strong>📜 Community Regulations:</strong> Please remain incredibly polite, maintain structural book discussions, and explicitly protect privacy.
  </div>

  <textarea id="forumMsg" placeholder="Share a message with the group..."></textarea>
  <button class="pill-btn" style="width:100%;" onclick="sendCommunityMsg()">Send to Feed</button>

  <div id="forumFeed" style="margin-top:20px;"></div>
</div>

<script>
  // Paste your unique Google Apps Script deployment URL here
  const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbw4YPYY1GzMczYf-50pPeY_RsOcgWpJpWCLSJkVOnvUMr65oPC0efPz_4BQpycqRkXQIw/exec";

  // Fetches live forum data from Google Sheets
  async function renderForum() {
    const feed = document.getElementById("forumFeed");
    feed.innerHTML = "<p style='color: var(--color-gray);'>Loading forum feed...</p>";
    
    try {
      const response = await fetch(SHEETS_API_URL);
      const allRows = await response.json();
      
      // Filter for community messages only
      const forumPosts = allRows.filter(item => item.type === "community");
      
      feed.innerHTML = forumPosts.length === 0 ? "<p>No messages in the forum yet. Start the conversation!</p>" : "";
      
      forumPosts.forEach((item) => {
        const msg = document.createElement("div");
        msg.className = "msg-card";
        msg.innerHTML = `
          <span><strong>Reader:</strong> ${item.content}</span>
          <button class="pill-btn" style="background:#ff6b6b!important;" onclick="deleteForumPost(${item.id})">Delete</button>
        `;
        feed.appendChild(msg);
      });
    } catch (error) {
      feed.innerHTML = "<p style='color: #ff6b6b;'>Failed to sync forum data.</p>";
      console.error("Sync Error:", error);
    }
  }

  // Sends a new message to the Google Sheet labeled as "community"
  async function sendCommunityMsg() {
    const inputEl = document.getElementById("forumMsg");
    const val = inputEl.value.trim();
    if (!val) return;

    inputEl.disabled = true;
    
    try {
      await fetch(SHEETS_API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "add",
          content: val,
          type: "community"
        })
      });
      
      inputEl.value = "";
      setTimeout(renderForum, 600); // Wait briefly for Google Sheets to update
    } catch (error) {
      alert("Error sending message.");
    } finally {
      inputEl.disabled = false;
    }
  }

  // Fallback local deletion logic for UI (Full sheet row cleanup requires Apps Script delete handling)
  window.deleteForumPost = (id) => {
    alert("Row indexed as ID " + id + " flagged for deletion. Refreshing view.");
    renderForum();
  };

  document.addEventListener("DOMContentLoaded", renderForum);
</script>
</body>
</html>
