---
layout: default
title: Community Room
---

<section class="page-header">
  <div class="wrap">
    <span class="section-label">Reader Hub</span>
    <h1>Community Room</h1>
    <p>Connect with other readers, share book reviews, discuss character arcs, and chat about your favorite chapters.</p>
  </div>
</section>

<section class="dashboard-core" style="padding: 40px 0;">
  <div class="wrap" style="display: grid; grid-template-columns: 1fr; gap: 40px;">
    
    <!-- Post Creation Box -->
    <div class="interactive-card" style="padding: 30px; background: rgba(38, 26, 65, 0.4);">
      <h3 style="margin-top: 0; margin-bottom: 15px; font-family: var(--font-display);">Start a Discussion</h3>
      <form id="communityForm">
        <div style="margin-bottom: 12px;">
          <input type="text" id="commUser" placeholder="Your Handle/Name (e.g., BookWorm42)" required style="width: 100%; background: #140e24; border: 1px solid var(--color-line); border-radius: 6px; padding: 10px; color: #fff; font-family: inherit;">
        </div>
        <div style="margin-bottom: 15px;">
          <textarea id="commContent" maxlength="800" placeholder="Share your reviews or talk with the community..." required style="width: 100%; min-height: 100px; background: #140e24; border: 1px solid var(--color-line); border-radius: 6px; padding: 12px; color: #fff; font-family: inherit; resize: vertical;"></textarea>
        </div>
        <button type="submit" class="pill-btn" style="width: 100%; border: none; cursor: pointer;">Broadcast Post</button>
      </form>
      <div id="commStatus" style="margin-top: 15px; font-size: 0.9rem; text-align: center; display: none;"></div>
    </div>

    <!-- Live Feed Column -->
    <div>
      <h2 style="font-family: var(--font-display); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
        <span>Discussion Stream</span>
        <span id="commIndicator" class="section-label" style="text-transform: none;">Loading...</span>
      </h2>
      <div id="communityFeed" style="display: flex; flex-direction: column; gap: 16px;">
        <!-- Dynamic timeline rows render here -->
      </div>
    </div>

  </div>
</section>

<script>
  // PASTE YOUR SAME GOOGLE WEB APP URL HERE
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwBjJMXE22ugJy2zxO4aGCsMLfP51YJB8lnZEuSPc019kiZu6ow-w2wR-FjSiaBLq4jsA/exec";
  const SHEET_NAME = "Community";

  const commForm = document.getElementById('communityForm');
  const commUser = document.getElementById('commUser');
  const commContent = document.getElementById('commContent');
  const commStatus = document.getElementById('commStatus');
  const communityFeed = document.getElementById('communityFeed');
  const commIndicator = document.getElementById('commIndicator');

  // Fetch and layout current thread matrix
  async function loadCommunity() {
    try {
      commIndicator.style.display = "inline-block";
      commIndicator.textContent = "Updating stream...";
      const response = await fetch(`${SCRIPT_URL}?sheet=${SHEET_NAME}`);
      const result = await response.json();
      
      communityFeed.innerHTML = "";
      if (result.status === "success" && result.data.length > 0) {
        result.data.forEach(item => {
          const date = new Date(item.timestamp).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
          const row = document.createElement('div');
          row.className = 'interactive-card';
          row.style.padding = '22px';
          row.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
              <span style="font-weight: 600; color: var(--color-accent-soft); font-family: var(--font-display);">@${item.username}</span>
              <span style="font-size: 0.75rem; color: var(--color-muted);">${date}</span>
            </div>
            <p style="margin: 0; line-height: 1.6; color: #cbd5e1; white-space: pre-wrap;">${item.content}</p>
          `;
          communityFeed.appendChild(row);
        });
        commIndicator.style.display = "none";
      } else {
        communityFeed.innerHTML = '<div class="empty-state">No open discussions yet. Break the ice above!</div>';
        commIndicator.style.display = "none";
      }
    } catch (error) {
      console.error(error);
      commIndicator.textContent = "Connection error";
      communityFeed.innerHTML = '<div class="empty-state" style="color: #ff6b6b;">Failed to compile community stream pipeline.</div>';
    }
  }

  // Process data transmission
  commForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    commStatus.style.display = "block";
    commStatus.style.color = "var(--color-muted)";
    commStatus.textContent = "Publishing post...";

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sheet: SHEET_NAME,
          username: commUser.value,
          content: commContent.value
        })
      });

      commStatus.style.color = "#4ade80";
      commStatus.textContent = "Post live in community stream!";
      commContent.value = "";
      
      setTimeout(loadCommunity, 1200);
    } catch (error) {
      commStatus.style.color = "#f87171";
      commStatus.textContent = "Publishing error. Try again.";
    }
  });

  // Trigger init on mount
  loadCommunity();
</script>
