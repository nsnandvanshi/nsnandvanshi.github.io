---
layout: default
---

<section class="post-single" style="padding: 40px 0;">
  <div class="wrap">
    <a class="back-link" href="{{ '/books/' | relative_url }}" style="text-decoration: none; font-weight: 500; margin-bottom: 2rem; display: inline-block;">&larr; All books</a>

    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; align-items: start;">
      <div class="book-cover" style="border-radius:6px; overflow:hidden; box-shadow:0 8px 24px rgba(42,42,82,0.12); max-width: 320px;">
        {% if page.cover %}
          <img src="{{ page.cover | relative_url }}" alt="{{ page.title }} cover" style="width: 100%; height: auto; display: block;">
        {% else %}
          <span class="book-cover-placeholder" style="display: block; padding: 100px 20px; text-align: center; background: rgba(255,255,255,0.05);">{{ page.title }}</span>
        {% endif %}
      </div>

      <div>
        <h1 style="font-size:clamp(1.8rem,3.4vw,2.6rem); font-style:italic; margin-bottom:1rem; line-height: 1.2;">{{ page.title }}</h1>
        <div class="post-content" style="max-width:none; line-height: 1.7;">
          {{ content }}
        </div>

        {% if page.links %}
          <div class="book-links" style="margin-top: 2.5rem; display: flex; flex-wrap: wrap; gap: 12px;">
            {% for link in page.links %}
              <a href="{{ link.url }}" 
                 target="_blank" 
                 rel="noopener" 
                 class="pill-btn" 
                 style="font-size: 0.85rem; padding: 10px 20px; letter-spacing: 0.02em; text-decoration: none;">
                 Get it on {{ link.store }}
              </a>
            {% endfor %}
          </div>
        {% endif %}
      </div>
    </div>
  </div>
</section>
