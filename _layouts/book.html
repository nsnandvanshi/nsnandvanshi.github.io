---
layout: default
---

<a class="back-link" href="{{ '/books/' | relative_url }}">&larr; All books</a>

<div style="display:grid; grid-template-columns: 280px 1fr; gap: 3rem; align-items: start; margin-top: 2rem;">
  <div class="book-cover" style="border-radius:6px; overflow:hidden; box-shadow:0 8px 24px rgba(42,42,82,0.12);">
    {% if page.cover %}
      <img src="{{ page.cover | relative_url }}" alt="{{ page.title }} cover">
    {% else %}
      <span class="book-cover-placeholder">{{ page.title }}</span>
    {% endif %}
  </div>

  <div>
    <h1 style="font-size:clamp(1.8rem,3.4vw,2.6rem); font-style:italic; margin-bottom:1rem; line-height: 1.2;">{{ page.title }}</h1>
    <div class="post-content" style="max-width:none;">
      {{ content }}
    </div>

    {% if page.links %}
      <div class="book-links" style="margin-top: 2.5rem; display: flex; flex-wrap: wrap; gap: 12px;">
        {% for link in page.links %}
          <a href="{{ link.url }}" 
             target="_blank" 
             rel="noopener" 
             class="pill-btn" 
             style="font-size: 0.85rem; padding: 10px 20px; letter-spacing: 0.02em; text-decoration: none;">
             Get it on {{ link.store }}
          </a>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</div>
