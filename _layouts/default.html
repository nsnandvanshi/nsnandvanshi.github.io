<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/images/logo.jpg' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="{{ site.author }} logo">
      </a>
      <nav class="main-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/books/' | relative_url }}">Books</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/#newsletter' | relative_url }}">Newsletter</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</span>
      <div class="footer-links">
        {% if site.social.instagram %}<a href="{{ site.social.instagram }}" target="_blank" rel="noopener">Instagram</a>{% endif %} 
        {% if site.social.medium %}<a href="{{ site.social.medium }}" target="_blank" rel="noopener">Medium</a>{% endif %}
      </div>
    </div>
  </footer>

</body>
</html>
