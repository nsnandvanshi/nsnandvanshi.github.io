title: N.S. Nandvanshi
description: Author of contemporary fiction and romance — stories about quiet love, healing, and the courage it takes to be true.
author: N.S. Nandvanshi

# IMPORTANT: change this to match your repository name exactly, with leading and trailing slashes
# If your repo is named "yourusername.github.io", set baseurl to "" (empty)
# If your repo is named anything else, e.g. "author-site", set baseurl to "/author-site"
baseurl: ""
url: ""

# Social + contact links — fill these in / update any time
social:
  instagram: "https://www.instagram.com/nsnandvanshi?igsh=bzVneDBhZW41YWhs"
  medium: "https://medium.com/@nsnandvanshi"

# Formspree form endpoint for the email signup — see SETUP.md for how to get this
formspree_id: "xkoaajge"

markdown: kramdown
permalink: /blog/:title/

collections:
  books:
    output: true
    permalink: /books/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "books"
    values:
      layout: "book"

exclude:
  - SETUP.md
  - HOW-TO-ADD-A-BOOK.md
  - HOW-TO-WRITE-A-BLOG-POST.md
  - Gemfile
  - Gemfile.lock
  - node_modules
